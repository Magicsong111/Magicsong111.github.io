<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>显示实时日期</title>
		<link rel="shortcut icon" href="https://pic.ntimg.cn/file/20150724/21478397_130311048576_2.jpg">
		<script>
			function displayDate()
			{
				document.getElementById("demo").innerHTML=Date();
			}
		</script>
	</head>
	<body>

		<h1>显示实时日期</h1>
		<p id="demo">简单大大的</p>
		<button type="button" onclick="javascript:displayDate()">显示实时日期</button>
	</body>
</html>
